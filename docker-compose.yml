###############################################################################
# WineBench Infrastructure - Docker Compose
# PostgreSQL 16 (pgvector) | Elasticsearch 8.x | Neo4j 5.x | Redis 7.x
#
# Usage:
#   cp .env.example .env    # then edit .env with your secrets
#   chmod +x scripts/*.sh
#   ./scripts/setup.sh      # first-time setup
#   docker compose up -d    # start services
#
# DigitalOcean recommended: 4 GB RAM / 2 vCPUs minimum
#                           8 GB RAM / 4 vCPUs recommended
###############################################################################

services:
  # ─── PostgreSQL: Structured facts, questions, metadata ───────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-winebench}
      POSTGRES_USER: ${POSTGRES_USER:-winebench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-winebench} -d ${POSTGRES_DB:-winebench}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
    networks:
      - winebench

  # ─── Elasticsearch: Full-text search, embedding similarity, dedup ────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: wb-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=winebench
      - bootstrap.memory_lock=true
    ports:
      - "127.0.0.1:${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
    networks:
      - winebench

  # ─── Neo4j: Knowledge graph — wine entities & relationships ──────────────
  neo4j:
    image: neo4j:5.19-community
    container_name: wb-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"   # Browser UI
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
    networks:
      - winebench

  # ─── Redis: Caching, scraping job queues, rate-limit tracking ────────────
  redis:
    image: redis:7-alpine
    container_name: wb-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - winebench

volumes:
  postgres_data:
  es_data:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  winebench:
    driver: bridge
