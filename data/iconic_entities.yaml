# OenoBench — Iconic wine entities (v2.2 fix #11)
#
# Facts whose ONLY named entity appears on this list are DROPPED from
# fact_to_question (FTQ) sampling — they produce questions solvable
# from world knowledge alone (B2 leakage). A fact that also names a
# non-iconic entity is fine to use (the non-iconic entity is the real
# subject).
#
# Seed list compiled from gold-v2 failures (WB-BIZ-0095-L2 referenced
# the Bordeaux 1855 classification — a textbook-famous wine concept
# every WSET student memorises).
#
# The filter is OFF for comparative / scenario / distractor strategies —
# they can still use iconic entities because the multi-fact construction
# requires genuine synthesis.

