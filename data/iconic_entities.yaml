# OenoBench — Iconic wine entities (v2.3 Phase F expansion)
#
# Facts whose ONLY named entity appears on this list are DROPPED from
# single-fact question sampling (fact_to_question + template strategies) —
# they produce questions solvable from world knowledge alone (B2 leakage).
#
# For multi-fact strategies (comparative, scenario_synthesis,
# distractor_mining), a fact MAY be iconic-only, but the generated
# bundle/pair/cluster must contain ≥1 non-iconic fact that anchors the
# question. See _bundle_has_non_iconic_anchor in _fact_sampler.py.
#
# Expansion history
# ─────────────────
# - v2.2 fix #11: 60 entries in 5 categories, seeded from gold-v2 failures.
# - v2.3 Phase F: expanded to ~170 entries across 9 categories.
#   Seeded from audit run #3 B2 failures (run_id 0bfe85dc-...) + expert
#   wine knowledge. Added: Bordeaux growths (1st–5th), Burgundy Grand Crus,
#   iconic Italian/New-World/Spanish producers, famous generic appellations.
#
# Entry-selection rules
# ─────────────────────
# - An entity is "iconic" if a well-read wine-knowledgeable taster
#   (WSET Level 3 +) can identify its region, grape, or style from the
#   name alone.  Anything a sommelier exam expects you to memorise belongs
#   here. Obscure sub-appellations, single-vineyards, and technical terms
#   do NOT belong here — they make legitimate fact-specific questions.
# - Entries within a category are sorted alphabetically for diff readability.
# - Case-insensitive match against entities[*].name; the filter lowercases
#   both the YAML entries and the fact entity names.

classifications:
  - AOC
  - AOP
  - Bordeaux 1855
  - Cru Bourgeois
  - DOC
