{% extends "base.html" %}

{% block title %}Reviewer guide — OenoBench Review{% endblock %}

{% block head_extra %}
<style>
    .instructions-card { max-width: 820px; margin: 0 auto; }
    .instructions-card h1 { font-size: 1.5rem; margin: 0 0 0.75rem; }
    .instructions-card h2 { font-size: 1.15rem; margin: 1.5rem 0 0.5rem; color: var(--accent); }
    .instructions-card h3 { font-size: 1rem; margin: 1rem 0 0.4rem; }
    .instructions-card p, .instructions-card li { color: var(--text-primary); font-size: 0.92rem; line-height: 1.6; }
    .instructions-card ul, .instructions-card ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .instructions-card code {
        background: var(--bg-input);
        border: 1px solid var(--border);
        padding: 0.05rem 0.3rem;
        border-radius: 3px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
    }
    .instructions-card pre {
        background: var(--bg-input);
        border: 1px solid var(--border);
        padding: 0.75rem 1rem;
        border-radius: 5px;
        overflow-x: auto;
        font-family: var(--font-mono);
        font-size: 0.85rem;
    }
    .instructions-card blockquote {
        border-left: 3px solid var(--accent);
        background: var(--bg-card-alt);
        padding: 0.5rem 1rem;
        margin: 0.75rem 0;
        color: var(--text-secondary);
    }
    .instructions-card table {
        width: 100%;
        border-collapse: collapse;
        margin: 0.75rem 0;
        font-size: 0.88rem;
    }
    .instructions-card th, .instructions-card td {
        border: 1px solid var(--border);
        padding: 0.45rem 0.65rem;
        text-align: left;
    }
    .instructions-card th { background: var(--bg-card-alt); }
</style>
{% endblock %}

{% block content %}
<article class="card instructions-card">
    {{ html_body|safe }}
</article>
{% endblock %}
